name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Type Check + Lint (P1.5 + P4.3) ───────────────────────────────
  typecheck:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      # P1.5 — TypeScript errors are now blocking (was: ignoreBuildErrors: true)
      - name: Type check
        run: npm run typecheck
      - name: ESLint
        run: npm run lint

  # ─── Unit Tests (P4.1 — Vitest) ────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Run Vitest
        run: npm run test
        env:
          NODE_ENV: test
          NEXTAUTH_SECRET: ci-test-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://test:test@localhost:5432/test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Build (verify production build succeeds) ──────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Build Next.js
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-secret-not-real
          NEXTAUTH_URL: https://afribayit.com
          # Use placeholder DB URL for build (build doesn't need real DB)
          DATABASE_URL: postgresql://placeholder:placeholder@placeholder/placeholder

  # ─── E2E Tests (P4.2 — Playwright) ─────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          NEXTAUTH_SECRET: ci-e2e-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
          CI: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── SAST — CodeQL Security Scan (P4.3) ────────────────────────────
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Security-extended queries for deeper analysis
          queries: security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  # ─── Dependency Vulnerability Scan (P4.3) ─────────────────────────
  dependency-scan:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: npm audit (high + critical)
        run: npm audit --audit-level=high --omit=dev || true
      - name: Run audit with JSON output
        run: npm audit --json > npm-audit.json || true
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          retention-days: 7
